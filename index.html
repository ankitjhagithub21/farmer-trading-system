<!DOCTYPE html>
<html>
<head>
<title>Farmer Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2e7d32">
</head>

<body>

<div class="header">👨‍🌾 Farmer Panel</div>

<div class="container">

<div class="card">
<input id="mobile" placeholder="📱 Enter Mobile">
<button onclick="getData()">🔍 Check</button>
<button id="installBtn" style="display:none;">📲 Install App</button>
</div>

<!-- 👇 Welcome Name -->
<div id="welcome"></div>

<div id="result"></div>

</div>

<script>
async function getData(){
let mobile = document.getElementById("mobile").value;

let res = await fetch(`/data/${mobile}`);
let data = await res.json();

let html="";
let total = 0;

// 👉 Welcome Name Logic
if(data.length > 0){
document.getElementById("welcome").innerHTML = `
<div class="card">
<h2>👋 Welcome, ${data[0].name}</h2>
</div>`;
}else{
document.getElementById("welcome").innerHTML = `
<div class="card">
❌ No Data Found
</div>`;
}

let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e)=>{
  e.preventDefault();
  deferredPrompt = e;

  let btn = document.getElementById("installBtn");
  btn.style.display = "block";

  // 🔥 blink effect
  setInterval(()=>{
    btn.style.opacity = btn.style.opacity == "1" ? "0.5" : "1";
  },500);
});

document.getElementById("installBtn").onclick = async ()=>{
  if(deferredPrompt){
    deferredPrompt.prompt();
    deferredPrompt = null;
  }
};

// 👉 Data Loop
data.forEach(d=>{
total += d.total;

html+=`
<div class="card deal">

<h3>👤 ${d.name}</h3>

📦 Product: ${d.product}<br>
📊 Packet: ${d.packet}<br>
⚖️ Weight: ${d.weight}<br>
💰 Rate: ₹${d.rate}<br>
💵 Total: ₹${d.total}<br>
📅 Date: ${d.date}<br>
📌 Status: ${d.status}<br>

${d.weightFile ? `<a class="download" href="uploads/${d.weightFile}" download>📎 Weight File</a><br>`:""}
${d.parchiFile ? `<a class="download" href="uploads/${d.parchiFile}" download>🧾 Parchi</a>`:""}

</div>`;
});

// 👉 Total
html += `<div class="card"><b>💰 Total Earnings: ₹${total}</b></div>`;

document.getElementById("result").innerHTML=html;
}
</script>

</body>
</html>
