<!DOCTYPE html>
<html>
<head>
<title>Farmer Trading System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ===== BODY ===== */
body{
margin:0;
font-family:sans-serif;
background:#f4f6f9;
}

/* ===== NAVBAR ===== */
.navbar{
background:#2e7d32;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.navbar h2{
margin:0;
}

.navbar button{
margin-left:10px;
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
}

/* ===== SLIDER ===== */
.slider img{
width:100%;
height:280px;
object-fit:cover;
}

/* ===== WELCOME ===== */
.welcome{
text-align:center;
padding:30px 15px;
background:white;
margin:15px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.welcome h1{
color:#2e7d32;
margin-bottom:10px;
}

.welcome p{
color:#555;
}

/* ===== FOOTER ===== */
.footer{
background:#2e7d32;
color:white;
text-align:center;
padding:12px;
margin-top:20px;
}

/* ===== MOBILE ===== */
@media(max-width:600px){

.slider img{
height:180px;
}

.crop{
width:45%;
}

}

</style>

</head>

<body>

<!-- 🔝 NAVBAR -->
<div class="navbar">
  <h2>🌾 Farmer System</h2>
  <div>
    <button onclick="window.location.href='admin.html'">Admin</button>
    <button onclick="window.location.href='index.html'">Farmer</button>
  </div>
</div>

<!-- 🎞️ SLIDER -->
<div class="slider">
  <img id="slide" src="https://picsum.photos/id/1018/1200/400">
</div>

<!-- 🌾 WELCOME -->
<div class="welcome">
  <h1>🌾 Welcome to Fulchand Mandal, Malpur</h1>
  <p>Trusted Farmer Trading Dashboard for Maize, Gehu, Dhan & Haldi</p>
</div>

</div>

<!-- 🔻 FOOTER -->
<div class="footer">
  © 2026 Farmer Trading System | Developed by Ramkrishna Kumar (Prince) 💪
</div>

<script>
let images=[
"https://picsum.photos/id/1018/1200/400",
"https://picsum.photos/id/1020/1200/400",
"https://picsum.photos/id/1039/1200/400",
"https://picsum.photos/id/1043/1200/400"
];

let i=0;

setInterval(()=>{
  i = (i+1) % images.length;
  document.getElementById("slide").src = images[i];
},3000);
</script>
</body>
</html>
